name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Identifier gate
        env:
          AGENT_SUITE_FORBIDDEN_IDENTIFIERS: ${{ secrets.AGENT_SUITE_FORBIDDEN_IDENTIFIERS }}
        run: python3 scripts/check_committed_identifiers.py

      - name: Plan index check
        run: python3 scripts/plan-index.py --check

      - name: Contract conformance check (WI-0.2)
        run: python3 scripts/validate-contracts.py --check

      - name: Feature probes check (WI-0.1)
        run: python3 scripts/feature-probes.py --check

      - name: Architecture test (import boundary)
        run: pytest tests/test_architecture.py -q

      - name: Lint (ruff)
        run: ruff check src tests scripts/plan-index.py scripts/feature-matrix.py scripts/validate-contracts.py scripts/feature-probes.py scripts/check_committed_identifiers.py

      - name: Type check (mypy)
        run: mypy --strict src scripts/feature-matrix.py scripts/validate-contracts.py

      - name: Run tests
        run: pytest --tb=short -q

  interop:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: interop
          POSTGRES_PASSWORD: interop_pw
          POSTGRES_DB: interop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U interop"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30

    env:
      INTEROP_DSN: postgresql://interop:interop_pw@localhost:5432/interop
      # Make the face-level interop test a hard gate: if the face packages don't
      # install, the test errors (not skips), so a packaging regression is a red
      # run, not a silent skip (Plan 002 WI-2).
      INTEROP_REQUIRE_FACES: "1"
      # Pinned revisions (Plan 015 WI-0.2 / WI-2.2): interop CI installs from
      # immutable revisions, not moving @main branches. Update these SHAs when
      # the candidate lock advances; do not revert to @main.
      REGISTA_SHA: b19e6bde669826551e556258b71c53e58e579e83
      AGENT_NOTES_SHA: 77395eb34b4ed59383664ed2d57239201dc27a33
      DOSSIER_SHA: 351740400aee114987947e6e1616dce315ee5c59
      CAIRN_SHA: f2b31515d9a0d0a141962b3da0f30f7be868b0e8

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PostgreSQL 18 client tools
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Install agent-suite
        run: pip install -e ".[dev]"

      - name: Install regista (spine)
        # regista-hraedon is the published PyPI distribution of hraedon/regista.
        # The import name remains 'regista'. SUITE.lock still pins the source
        # SHA for reproducibility checks; the install pulls from PyPI for speed.
        run: pip install "regista-hraedon==0.5.1"

      # Both face repos are public — install as a hard required step. If the
      # install fails, CI fails: combined with INTEROP_REQUIRE_FACES=1 above,
      # the face-level interop proof can no longer silently regress to a skip
      # (Plan 002 WI-1).
      - name: Install faces (agent-notes + dossier)
        run: |
          pip install "git+https://github.com/hraedon/agent-notes.git@${AGENT_NOTES_SHA}" \
                      "git+https://github.com/hraedon/dossier.git@${DOSSIER_SHA}"

      - name: Install agent-provenance (cairn)
        run: pip install "git+https://github.com/hraedon/agent-provenance.git@${CAIRN_SHA}"

      - name: Run interop + tamper + restore-drill + adversarial-corpus tests
        run: pytest tests/test_interop.py tests/test_tamper.py tests/test_restore_drill.py tests/test_adversarial_corpus.py -v --tb=short

  # Plan 003 WI-5.1 — prove agent-suite imports and unit tests pass on native
  # Windows. agent-suite is stdlib-only, so this is primarily a guard against
  # future non-portable additions (os.O_NOFOLLOW, fcntl, etc.). Integration
  # tests (interop/tamper/restore-drill) skip cleanly — no Docker or Postgres
  # on the windows-latest runner.
  windows-test:
    runs-on: windows-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Architecture test (import boundary)
        run: pytest tests/test_architecture.py -q

      - name: Contract conformance check (WI-0.2)
        run: python3 scripts/validate-contracts.py --check

      - name: Lint (ruff)
        run: ruff check src tests scripts/plan-index.py scripts/feature-matrix.py scripts/validate-contracts.py scripts/feature-probes.py scripts/check_committed_identifiers.py

      - name: Type check (mypy)
        run: mypy --strict src scripts/feature-matrix.py scripts/validate-contracts.py

      - name: Run tests
        run: pytest --tb=short -q
