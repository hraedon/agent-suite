name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Identifier gate
        env:
          AGENT_SUITE_FORBIDDEN_IDENTIFIERS: ${{ secrets.AGENT_SUITE_FORBIDDEN_IDENTIFIERS }}
        run: python3 scripts/check_committed_identifiers.py

      - name: Plan index check
        run: python3 scripts/plan-index.py --check

      - name: Contract conformance check (WI-0.2)
        run: python3 scripts/validate-contracts.py --check

      - name: Feature probes check (WI-0.1)
        # Non-strict structural check: detects status/proof drift on rows
        # whose probes CAN run (agent-suite rows). Sibling-component probes
        # return HAND_ASSESSED here (no sibling checkouts in this job) and
        # are reported as warnings, not failures. The strict check runs in
        # the feature-probes job below with all siblings checked out.
        run: python3 scripts/feature-probes.py --check

      - name: Architecture test (import boundary)
        run: pytest tests/test_architecture.py -q

      - name: Lint (ruff)
        run: ruff check src tests scripts/plan-index.py scripts/feature-matrix.py scripts/validate-contracts.py scripts/feature-probes.py scripts/check_committed_identifiers.py

      - name: Type check (mypy)
        run: mypy --strict src scripts/feature-matrix.py scripts/validate-contracts.py

      - name: Run tests
        run: pytest --tb=short -q

  interop:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: interop
          POSTGRES_PASSWORD: interop_pw
          POSTGRES_DB: interop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U interop"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30

    env:
      INTEROP_DSN: postgresql://interop:interop_pw@localhost:5432/interop
      # Make the face-level interop test a hard gate: if the face packages don't
      # install, the test errors (not skips), so a packaging regression is a red
      # run, not a silent skip (Plan 002 WI-2).
      INTEROP_REQUIRE_FACES: "1"
      # Pinned revisions (Plan 015 WI-0.2 / WI-2.2): interop CI installs from
      # immutable revisions, not moving @main branches. Update these SHAs when
      # the candidate lock advances; do not revert to @main.
      REGISTA_SHA: 9718b941939884fee94c260f19efe3e4040c456b
      AGENT_NOTES_SHA: 496914709de3bac1b0a039919b6777d38111a230
      DOSSIER_SHA: a4a60567abb69c5081b638ad82bfbd26df824b62
      CAIRN_SHA: e29236c971b54f8d60824bef498cc71211f1ee7d

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PostgreSQL 18 client tools
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Install agent-suite
        run: pip install -e ".[dev]"

      - name: Install regista (spine)
        # regista-hraedon is the published PyPI distribution of hraedon/regista.
        # The import name remains 'regista'. SUITE.lock still pins the source
        # SHA for reproducibility checks; the install pulls from PyPI for speed.
        # 0.5.3 is the Plan 018 P0 rollup (stderr logging default, CLI error
        # envelope, no-traceback error paths, conformance kit); 0.5.2 predated it.
        run: pip install regista-hraedon==0.5.3

      # Both face repos are public — install as a hard required step. If the
      # install fails, CI fails: combined with INTEROP_REQUIRE_FACES=1 above,
      # the face-level interop proof can no longer silently regress to a skip
      # (Plan 002 WI-1).
      - name: Install faces (agent-notes + dossier)
        run: |
          pip install "git+https://github.com/hraedon/agent-notes.git@${AGENT_NOTES_SHA}" \
                      "git+https://github.com/hraedon/dossier.git@${DOSSIER_SHA}"

      - name: Install agent-provenance (cairn)
        run: pip install "git+https://github.com/hraedon/agent-provenance.git@${CAIRN_SHA}"

      - name: Set up agent-notes schema (skill-smoke prerequisite)
        run: |
          # agent-notes uses TWO stores (agent-notes core/config.py two-DSN
          # contract): the domain DB (its own public.projects/workspaces) and a
          # SEPARATE regista store (regista's public.projects catalog + per-
          # project event schemas). The two public.projects shapes collide in
          # one DB, so the smoke suite needs two databases.
          #   - agent_notes_smoke:         domain schema applied below
          #   - agent_notes_smoke_regista: pure regista store, provisioned on
          #                                the fly by regista.create_project
          psql "$INTEROP_DSN" -c "CREATE DATABASE agent_notes_smoke;" || true
          psql "$INTEROP_DSN" -c "CREATE DATABASE agent_notes_smoke_regista;" || true
          git clone --quiet --depth 1 "https://github.com/hraedon/agent-notes.git" /tmp/an-src
          git -C /tmp/an-src checkout "$AGENT_NOTES_SHA" --quiet 2>/dev/null || true
          SMOKE_DSN="postgresql://interop:interop_pw@localhost:5432/agent_notes_smoke"
          for f in /tmp/an-src/schema/*.sql; do
            psql "$SMOKE_DSN" -f "$f" 2>&1 | grep -v "^CREATE\|^ALTER\|^INSERT\|^DROP\|^SET\|^--" || true
          done
          echo "agent-notes domain schema applied to agent_notes_smoke"

      - name: Run interop + tamper + restore-drill + adversarial-corpus + skill-smoke tests
        env:
          AGENT_NOTES_SMOKE_DSN: postgresql://interop:interop_pw@localhost:5432/agent_notes_smoke
          AGENT_NOTES_SMOKE_REGISTA_DSN: postgresql://interop:interop_pw@localhost:5432/agent_notes_smoke_regista
        run: pytest tests/test_interop.py tests/test_tamper.py tests/test_restore_drill.py tests/test_adversarial_corpus.py tests/test_skill_smoke.py -v --tb=short

  # Plan 015 WI-0.1 — strict feature-probe verification with all sibling
  # components checked out at SUITE.lock-pinned revisions. Prevents the
  # false-green where missing siblings produce HAND_ASSESSED that preserves
  # committed status (Sol round-3 finding #1). Revisions are parsed from
  # SUITE.lock so the lock file is the single source of truth — no third
  # set of env-var SHAs to drift out of sync with the interop pins.
  feature-probes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install agent-suite
        run: pip install -e ".[dev]"

      - name: Checkout sibling components at SUITE.lock-pinned revisions
        run: |
          mkdir -p /tmp/siblings
          python3 -c "
          import tomllib, subprocess
          from pathlib import Path
          lock = tomllib.loads(Path('SUITE.lock').read_text())
          for name, info in lock['components'].items():
              repo = info['repo']
              rev = info['revision']
              dest = Path('/tmp/siblings') / name
              subprocess.run(['git', 'clone', '--quiet', f'https://github.com/{repo}.git', str(dest)], check=True)
              subprocess.run(['git', '-C', str(dest), 'checkout', rev], check=True)
              print(f'  {name} @ {rev[:8]}')
          "

      - name: Install regista (spine)
        run: pip install /tmp/siblings/regista

      - name: Install faces (agent-notes + dossier)
        run: pip install /tmp/siblings/agent-notes /tmp/siblings/dossier

      - name: Install agent-provenance (cairn)
        run: pip install /tmp/siblings/agent-provenance

      - name: Install agent-capability-broker
        run: pip install /tmp/siblings/agent-capability-broker

      # agent-wake has no importable package (package=None in the probe
      # revision sources); only its source checkout is needed for the
      # source-based and CLI-based probes. It was cloned above.

      - name: Run feature-probe check (strict)
        env:
          AGENT_SUITE_SIBLINGS_ROOT: /tmp/siblings
        run: python3 scripts/feature-probes.py --check --strict

  # Plan 003 WI-5.1 — prove agent-suite imports and unit tests pass on native
  # Windows. agent-suite is stdlib-only, so this is primarily a guard against
  # future non-portable additions (os.O_NOFOLLOW, fcntl, etc.). Integration
  # tests (interop/tamper/restore-drill) skip cleanly — no Docker or Postgres
  # on the windows-latest runner.
  windows-test:
    runs-on: windows-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Architecture test (import boundary)
        run: pytest tests/test_architecture.py -q

      - name: Contract conformance check (WI-0.2)
        run: python3 scripts/validate-contracts.py --check

      - name: Lint (ruff)
        run: ruff check src tests scripts/plan-index.py scripts/feature-matrix.py scripts/validate-contracts.py scripts/feature-probes.py scripts/check_committed_identifiers.py

      - name: Type check (mypy)
        run: mypy --strict src scripts/feature-matrix.py scripts/validate-contracts.py

      - name: Run tests
        run: pytest --tb=short -q
