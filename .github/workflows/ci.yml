name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Identifier gate
        run: python3 scripts/identifier-gate.py

      - name: Plan index check
        run: python3 scripts/plan-index.py --check

      - name: Architecture test (import boundary)
        run: pytest tests/test_architecture.py -q

      - name: Lint (ruff)
        run: ruff check src tests scripts/plan-index.py

      - name: Type check (mypy)
        run: mypy --strict src

      - name: Run tests
        run: pytest --tb=short -q

  interop:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: interop
          POSTGRES_PASSWORD: interop_pw
          POSTGRES_DB: interop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U interop"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30

    env:
      INTEROP_DSN: postgresql://interop:interop_pw@localhost:5432/interop
      # Make the face-level interop test a hard gate: if the face packages don't
      # install, the test errors (not skips), so a packaging regression is a red
      # run, not a silent skip (Plan 002 WI-2).
      INTEROP_REQUIRE_FACES: "1"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install agent-suite
        run: pip install -e ".[dev]"

      - name: Install regista (spine)
        run: pip install "git+https://github.com/hraedon/regista.git@main"

      # Both face repos are public — install as a hard required step. If the
      # install fails, CI fails: combined with INTEROP_REQUIRE_FACES=1 above,
      # the face-level interop proof can no longer silently regress to a skip
      # (Plan 002 WI-1).
      - name: Install faces (agent-notes + dossier)
        run: |
          pip install "git+https://github.com/hraedon/agent-notes.git@main" \
                      "git+https://github.com/hraedon/dossier.git@main"

      - name: Run interop + tamper + restore-drill tests
        run: pytest tests/test_interop.py tests/test_tamper.py tests/test_restore_drill.py -v --tb=short

  # Plan 003 WI-5.1 — prove agent-suite imports and unit tests pass on native
  # Windows. agent-suite is stdlib-only, so this is primarily a guard against
  # future non-portable additions (os.O_NOFOLLOW, fcntl, etc.). Integration
  # tests (interop/tamper/restore-drill) skip cleanly — no Docker or Postgres
  # on the windows-latest runner.
  windows-test:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Architecture test (import boundary)
        run: pytest tests/test_architecture.py -q

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy --strict src

      - name: Run tests
        run: pytest --tb=short -q
