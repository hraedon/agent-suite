name: Release artifacts

# Generates two release-time artifacts on tag push and attaches them to the
# GitHub release:
#
# 1. ``data/candidate-inventory.json`` — the operator-specific live estate
#    state (current-state read of checkouts + suite.env). A committed
#    snapshot in the main branch would always be self-stale (committing it
#    changes the umbrella HEAD it just snapshotted — see Sol round-2/3
#    finding #2). Generating it in CI against the tagged release revision
#    is the canonical path.
#
#    Sol round-3 finding #2: the release workflow must produce proof of a
#    clean, tested source candidate, not just deployment metadata. Sibling
#    components are checked out at SUITE.lock-pinned revisions, the
#    feature-probe strict check must pass, and source_tree_converged must
#    be true before the inventory is attached to the release.
#
# 2. ``release-manifest.json`` — the immutable release-time description of
#    the published candidate (Sol Gate 0 / Workstream 2). Records the
#    umbrella tag SHA, all six constituent SHAs, package versions, wheel
#    hashes, and the lock identity. The manifest is distinct from the
#    inventory: the manifest describes what was published; the inventory
#    describes what the operator's estate looks like right now. The two
#    bind via ``Inventory.bind_to_manifest``.
#
#    The wheel-build step is NOT yet wired in CI — the manifest's
#    ``wheel_sha256`` and ``source_archive_sha256`` fields honestly
#    record empty strings ("not provided"). A future work item will add
#    the wheel-build step; the manifest schema is forward-compatible
#    (empty strings are explicit "not provided", not "failed to compute").
#
# Triggers only on tag pushes matching ``v*``. Both artifacts are uploaded
# to the release; the main branch never carries them.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout@v4
        with:
          # Full history so the origin probe can compare against main.
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install agent-suite
        run: pip install -e ".[dev]"

      - name: Checkout sibling components at SUITE.lock-pinned revisions
        run: |
          mkdir -p /tmp/siblings
          python3 -c "
          import tomllib, subprocess
          from pathlib import Path
          lock = tomllib.loads(Path('SUITE.lock').read_text())
          for name, info in lock['components'].items():
              repo = info['repo']
              rev = info['revision']
              dest = Path('/tmp/siblings') / name
              subprocess.run(['git', 'clone', '--quiet', f'https://github.com/{repo}.git', str(dest)], check=True)
              subprocess.run(['git', '-C', str(dest), 'checkout', rev], check=True)
              print(f'  {name} @ {rev[:8]}')
          "

      - name: Install regista (spine)
        run: pip install /tmp/siblings/regista

      - name: Install faces (agent-notes + dossier)
        run: pip install /tmp/siblings/agent-notes /tmp/siblings/dossier

      - name: Install agent-provenance (cairn)
        run: pip install /tmp/siblings/agent-provenance

      - name: Install agent-capability-broker
        run: pip install /tmp/siblings/agent-capability-broker

      - name: Verify feature matrix (strict)
        env:
          AGENT_SUITE_SIBLINGS_ROOT: /tmp/siblings
        run: python3 scripts/feature-probes.py --check --strict

      - name: Generate candidate inventory
        env:
          AGENT_SUITE_SIBLINGS_ROOT: /tmp/siblings
        run: |
          mkdir -p out
          agent-suite inventory --json > out/candidate-inventory.json
          cat out/candidate-inventory.json

      - name: Verify source_tree_converged
        run: |
          python3 -c "
          import json, sys
          with open('out/candidate-inventory.json') as f:
              inv = json.load(f)
          converged = inv.get('summary', {}).get('source_tree_converged', False)
          if not converged:
              print('ERROR: source_tree_converged is false — the release inventory', file=sys.stderr)
              print('does not prove a clean, tested source candidate (Sol round-3 #2).', file=sys.stderr)
              sys.exit(1)
          print('source_tree_converged: true')
          "

      # The release manifest is the immutable release-time description of the
      # published candidate. It records the umbrella tag SHA (resolved from
      # the git tag that triggered this run), all six constituent SHAs from
      # SUITE.lock, the regista version quad, and the lock identity. Wheel
      # hashes are empty strings today (no wheel-build step); a future WI
      # will add the build and populate these fields.
      - name: Build release manifest
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          agent-suite release-manifest build --tag "$RELEASE_TAG" --json > out/release-manifest.json
          cat out/release-manifest.json

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # softprops/action-gh-release@v2
        with:
          files: |
            out/candidate-inventory.json
            out/release-manifest.json
