[project]
name = "agent-suite-conformance"
version = "1.0.0"
description = "CLI contract v1 conformance kit for the agent suite — one centrally versioned package, consumed pinned by every component."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "hraedon" }]
keywords = ["agent-suite", "conformance", "cli-contract", "testing"]
dependencies = []

[project.urls]
Repository = "https://github.com/hraedon/agent-suite"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_suite_conformance"]

[tool.mypy]
strict = true
python_version = "3.12"
files = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"
